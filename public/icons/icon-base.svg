<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F4D"/>
      <stop offset="50%" style="stop-color:#122D6A"/>
      <stop offset="100%" style="stop-color:#1A3A7F"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  
  <!-- Simple brain icon - clean silhouette -->
  <g transform="translate(256, 195)" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere outline -->
    <path d="M-6 -60 C-30 -62 -58 -55 -65 -30 C-72 -5 -65 15 -55 28 C-68 38 -72 58 -60 75 C-48 92 -28 90 -15 85 C-10 95 -2 100 6 100" fill="white" fill-opacity="0.95" stroke="none"/>
    <!-- Right hemisphere outline -->
    <path d="M6 -60 C30 -62 58 -55 65 -30 C72 -5 65 15 55 28 C68 38 72 58 60 75 C48 92 28 90 15 85 C10 95 2 100 -6 100" fill="white" fill-opacity="0.95" stroke="none"/>
    <!-- Center line -->
    <line x1="0" y1="-58" x2="0" y2="100" stroke="#122D6A" stroke-width="5" opacity="0.25"/>
    <!-- Simple fold lines left -->
    <path d="M-12 -20 C-32 -15 -48 -5 -50 10" stroke="#7BC4FF" stroke-width="5" fill="none" opacity="0.5"/>
    <path d="M-8 25 C-28 32 -45 48 -40 65" stroke="#7BC4FF" stroke-width="5" fill="none" opacity="0.5"/>
    <!-- Simple fold lines right -->
    <path d="M12 -20 C32 -15 48 -5 50 10" stroke="#7BC4FF" stroke-width="5" fill="none" opacity="0.5"/>
    <path d="M8 25 C28 32 45 48 40 65" stroke="#7BC4FF" stroke-width="5" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Text "IAprova" -->
  <text x="256" y="388" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-1">
    <tspan fill="#7BC4FF">IA</tspan><tspan fill="#FFFFFF">prova</tspan>
  </text>
</svg>
