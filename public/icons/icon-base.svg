<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F4D"/>
      <stop offset="50%" style="stop-color:#122D6A"/>
      <stop offset="100%" style="stop-color:#1A3A7F"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0EDFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square (maskable safe zone) -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="rgba(123,196,255,0.08)" stroke-width="2"/>
  
  <!-- Brain icon - centered, larger -->
  <g transform="translate(256, 185)" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M-8 -65 C-8 -65 -55 -70 -68 -40 C-80 -12 -72 10 -60 25 C-72 30 -82 50 -70 72 C-58 94 -35 95 -20 90 C-15 100 -5 108 8 108 L-8 108 L-8 -65Z"
          fill="url(#brainGrad)" opacity="0.95"/>
    <!-- Right hemisphere -->
    <path d="M8 -65 C8 -65 55 -70 68 -40 C80 -12 72 10 60 25 C72 30 82 50 70 72 C58 94 35 95 20 90 C15 100 5 108 -8 108 L8 108 L8 -65Z"
          fill="url(#brainGrad)" opacity="0.95"/>
    <!-- Center line -->
    <line x1="0" y1="-62" x2="0" y2="108" stroke="#122D6A" stroke-width="4" opacity="0.3"/>
    <!-- Brain folds left -->
    <path d="M-15 -30 C-35 -25 -50 -15 -55 5" stroke="#7BC4FF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M-10 10 C-30 15 -52 30 -48 55" stroke="#7BC4FF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M-8 50 C-22 58 -35 72 -28 85" stroke="#7BC4FF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Brain folds right -->
    <path d="M15 -30 C35 -25 50 -15 55 5" stroke="#7BC4FF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M10 10 C30 15 52 30 48 55" stroke="#7BC4FF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M8 50 C22 58 35 72 28 85" stroke="#7BC4FF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Neural sparkles -->
    <circle cx="-42" cy="-8" r="4" fill="#7BC4FF" opacity="0.8"/>
    <circle cx="42" cy="-8" r="4" fill="#7BC4FF" opacity="0.8"/>
    <circle cx="-38" cy="48" r="3" fill="#7BC4FF" opacity="0.7"/>
    <circle cx="38" cy="48" r="3" fill="#7BC4FF" opacity="0.7"/>
  </g>
  
  <!-- Text "IAprova" -->
  <text x="256" y="380" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-1">
    <tspan fill="#7BC4FF">IA</tspan><tspan fill="#FFFFFF">prova</tspan>
  </text>
  
  <!-- Subtle tagline -->
  <text x="256" y="418" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="500" fill="#7BC4FF" opacity="0.7" letter-spacing="4">
    CONCURSOS
  </text>
</svg>
